# electron-builder 配置
appId: com.mimo.desktop
productName: MiMo
directories:
  output: dist
  buildResources: assets

# 文件关联（可选）
fileAssociations:
  - ext: mimo
    name: MiMo Session
    role: Editor

# macOS 配置
mac:
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

# Windows 配置
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

# NSIS 安装程序配置
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: MiMo

# Linux 配置
linux:
  icon: assets/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64

# 发布配置（自动发布到 GitHub Releases）
# publish:
#   - provider: github
#     repo: your-org/mimo
#     owner: your-org

# 额外资源文件
extraResources:
  - from: dist
    to: dist
  - from: node_modules
    to: node_modules

# 压缩级别
compression: normal

# 禁用代码签名（如有证书可启用）
# macSign: true
# winSign: true

# 构建版本号（使用 package.json 的 version）
buildVersion: "${version}"

# 是否归档构建输出（用于调试）
archiveFormat: zip
