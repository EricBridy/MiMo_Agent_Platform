name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run linter
        run: npm run lint
      
      - name: Run tests
        run: npm test
      
      - name: Build packages
        run: npm run build

  build-desktop:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build desktop app
        run: npm run build --workspace=apps/desktop
      
      - name: Package desktop app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run package:desktop -- --win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Package desktop app (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run package:desktop -- --mac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Package desktop app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run package:desktop -- --linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: MiMo-Windows
          path: apps/desktop/dist/*.exe
      
      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: MiMo-macOS
          path: apps/desktop/dist/*.dmg
      
      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: MiMo-Linux
          path: apps/desktop/dist/*.AppImage

  build-mobile-android:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Android APK
        run: |
          cd apps/mobile/android
          ./gradlew assembleRelease
        env:
          ANDROID_HOME: /usr/local/lib/android
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiMo-Android
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk

  build-mobile-ios:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install CocoaPods
        run: |
          cd apps/mobile/ios
          pod install
      
      - name: Build iOS
        run: |
          cd apps/mobile/ios
          xcodebuild -workspace MiMo.xcworkspace -scheme MiMo -configuration Release -archivePath build/MiMo.xcarchive archive
          xcodebuild -exportArchive -archivePath build/MiMo.xcarchive -exportOptionsPlist exportOptions.plist -exportPath build/
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MiMo-iOS
          path: apps/mobile/ios/build/*.ipa
